<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Islamic Comfort Quotes</title>

  <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 16px;
      resize: vertical;
      outline: none;
      margin-top: 14px;
    }

    button {
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #22c55e;
      color: #052e16;
    }

    .toggle-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e2e8f0;
      font-size: 15px;
    }

    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.07);
      border-left: 4px solid #22c55e;
      display: none;
    }

    .arabic {
      direction: rtl;
      text-align: right;
      font-size: 1.7rem;
      line-height: 2;
      margin-bottom: 14px;
      font-family: "Amiri", serif;
      color: #f8fafc;
    }

    .quote {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #f8fafc;
    }

    .reference {
      color: #94a3b8;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Find comfort through Islamic reminders</h1>
    <p>
      Share what you are struggling with, and receive a relevant Islamic quote.
    </p>

    <textarea
      id="struggleInput"
      placeholder="Example: I feel overwhelmed and anxious about the future..."
    ></textarea>

    <div class="toggle-row">
      <input type="checkbox" id="showArabicToggle" checked onchange="updateArabicVisibility()">
      <label for="showArabicToggle">Show Arabic text</label>
    </div>

    <button onclick="getReminder()">Get Reminder</button>

    <div class="status" id="statusText"></div>

    <div class="result" id="resultBox">
      <div class="arabic" id="arabicText"></div>
      <div class="quote" id="quoteText"></div>
      <div class="reference" id="quoteReference"></div>
    </div>
  </div>

  <script>
    function updateArabicVisibility() {
      const arabicText = document.getElementById("arabicText");
      const showArabic = document.getElementById("showArabicToggle").checked;

      if (showArabic) {
        arabicText.classList.remove("hidden");
      } else {
        arabicText.classList.add("hidden");
      }
    }

    async function getReminder() {
      const input = document.getElementById("struggleInput").value.trim();
      const arabicText = document.getElementById("arabicText");
      const quoteText = document.getElementById("quoteText");
      const quoteReference = document.getElementById("quoteReference");
      const resultBox = document.getElementById("resultBox");
      const statusText = document.getElementById("statusText");

      if (!input) {
        statusText.textContent = "Please enter something first.";
        resultBox.style.display = "none";
        return;
      }

      statusText.textContent = "Finding a reminder...";

      try {
        const response = await fetch("https://islamic-quote-app.onrender.com/get-quote", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text: input })
        });

        if (!response.ok) {
          throw new Error("Request failed");
        }

        const data = await response.json();

        arabicText.textContent = data.arabic || "";
        quoteText.textContent = `"${data.quote}"`;
        quoteReference.textContent = data.reference;

        resultBox.style.display = "block";
        statusText.textContent = "";

        updateArabicVisibility();
      } catch (error) {
        statusText.textContent = "Could not connect to the backend.";
        resultBox.style.display = "none";
        console.error(error);
      }
    }
  </script>
</body>
</html>
